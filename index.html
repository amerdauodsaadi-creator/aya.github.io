<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; background: #050505; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    #controls { position: absolute; bottom: 30px; z-index: 10; }
    button { 
      padding: 15px 40px; font-size: 18px; letter-spacing: 2px;
      background: transparent; border: 2px solid #ff00ff; color: #ff00ff;
      border-radius: 50px; cursor: pointer; transition: 0.3s;
      text-transform: uppercase; font-family: 'Segoe UI', sans-serif;
    }
    button:hover { background: #ff00ff; color: white; box-shadow: 0 0 20px #ff00ff; }
  </style>
</head>
<body>
  <div id="controls"><button onclick="startBloom()">Awaken the Lotus</button></div>

  <script>
    let bloom = 0;
    let active = false;
    let particles = [];
    let ripples = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      angleMode(DEGREES);
    }

    function draw() {
      background(5, 5, 15);
      translate(width / 2, height / 2);

      // 1. Water Ripples
      drawRipples();

      // 2. The Great Leaf (Lily Pad)
      let leafOsc = sin(frameCount * 1.5) * 3;
      push();
      rotate(leafOsc);
      drawLilyPad();
      pop();

      // 3. Blooming Logic
      if (active && bloom < 1) bloom += 0.008; 

      // 4. Draw Lotus Layers (Back to Front)
      // We use 'bloom' to control both rotation and scale for a "furling" effect
      drawLotusLayer(12, 220 * bloom, color(255, 50, 150, 150), 1.4, 40 * (1 - bloom));
      drawLotusLayer(10, 160 * bloom, color(255, 100, 200, 180), 1.2, 20 * (1 - bloom));
      drawLotusLayer(8, 90 * bloom, color(255, 200, 255, 220), 0.9, 0);

      // 5. Particle System (Pollen Sparkles)
      if (bloom > 0.8) {
        if (random(1) > 0.8) particles.push(new Particle());
      }
      for (let p of particles) {
        p.update();
        p.show();
      }
      
      // Cleanup particles
      particles = particles.filter(p => p.alpha > 0);
    }

    function drawLilyPad() {
      noStroke();
      fill(20, 60, 40, 200);
      drawingContext.shadowBlur = 20;
      drawingContext.shadowColor = 'green';
      
      beginShape();
      for (let a = 0; a < 340; a++) {
        let r = 250 + sin(a * 5) * 5;
        let x = r * cos(a);
        let y = r * 0.5 * sin(a);
        vertex(x, y);
      }
      endShape(CLOSE);
      drawingContext.shadowBlur = 0;
    }

    function drawLotusLayer(count, size, col, stretch, rotOffset) {
      push();
      fill(col);
      stroke(255, 255, 255, 100);
      strokeWeight(0.5);
      
      for (let i = 0; i < count; i++) {
        push();
        rotate((360 / count) * i + rotOffset + sin(frameCount * 0.5) * 3);
        
        // Petal Shape (Bezier curve for organic look)
        beginShape();
        vertex(0, 0);
        bezierVertex(size/2, -size/3, size, -size/6, size * stretch, 0);
        bezierVertex(size, size/6, size/2, size/3, 0, 0);
        endShape();
        pop();
      }
      pop();
    }

    function drawRipples() {
      if (frameCount % 60 == 0) ripples.push({r: 0, a: 255});
      noFill();
      for (let r of ripples) {
        stroke(100, 200, 255, r.a);
        ellipse(0, 0, r.r, r.r * 0.5);
        r.r += 2;
        r.a -= 2;
      }
      ripples = ripples.filter(r => r.a > 0);
    }

    class Particle {
      constructor() {
        this.pos = createVector(random(-20, 20), random(-10, 10));
        this.vel = createVector(random(-1, 1), random(-2, -5));
        this.alpha = 255;
      }
      update() {
        this.pos.add(this.vel);
        this.alpha -= 3;
      }
      show() {
        noStroke();
        fill(255, 215, 0, this.alpha);
        circle(this.pos.x, this.pos.y, random(2, 5));
      }
    }

    function startBloom() {
      active = true;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
